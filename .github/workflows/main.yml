name: Daily Yahoo Finance Bubble Update

on:
  schedule:
    - cron: '59 20 * * *'
  workflow_dispatch:

jobs:
  update-csvs:
    name: Scrape & Commit CSV Updates
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance scipy fredapi matplotlib

      - name: Run CSV scraper
        run: python scripts/YF-Data-Scraper.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/csv)" ]]; then
            git add data/csv
            git commit -m "Automated CSV update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin master --force
            echo "✅ CSV updates committed and force-pushed."
          else
            echo "⚠️ No CSV changes detected — skipping commit."
          fi

  generate-mat-json:
    name: Generate JSON, Upload to Blob & Update Mapping
    runs-on: ubuntu-latest
    needs: update-csvs
    permissions:
      contents: write
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Pull latest CSV changes from master
        run: git pull origin master
  
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
  
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy matplotlib fredapi
  
      - name: Run MAT generator
        run: python scripts/sbub_run.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  
      - name: Convert MAT into JSON files
        run: |
          mkdir -p public/data
          python scripts/bubble_estimator.py
          echo "📦 JSON files created in public/data"
  
      - name: Upload JSON files to Vercel Blob & generate mapping
        run: |
          # Ensure mapping file exists
          if [ ! -f blob_mapping.json ]; then
            echo '{}' > blob_mapping.json
          fi
      
          for file in public/data/*.json; do
            filename=$(basename "$file")
            stock=${filename%%_*}
      
            response=$(curl -s -X POST "https://api.vercel.com/v1/blob" \
              -H "Authorization: Bearer ${{ secrets.BLOB_READ_WRITE_TOKEN }}" \
              -F "projectId=<YOUR_PROJECT_ID>" \
              -F "file=@$file")
      
            url=$(echo "$response" | jq -r '.url')
            echo "Uploaded $filename -> $url"
      
            # Update mapping safely
            tmpfile=$(mktemp)
            jq --arg key "$stock" --arg value "$url" '. + {($key): $value}' blob_mapping.json > "$tmpfile" 2>/dev/null
            if [ $? -ne 0 ]; then
              echo "⚠️ Failed to update mapping for $stock, keeping existing value."
              rm "$tmpfile"
            else
              mv "$tmpfile" blob_mapping.json
            fi
          done
      
          mv blob_mapping.json public/blob_mapping.json
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

  
      - name: Commit JSON files & blob mapping
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json public/blob_mapping.json
          git pull origin master
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Update JSON files and blob mapping: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin master --force
            echo "✅ JSON files and blob mapping committed."
          else
            echo "⚠️ No changes detected — skipping commit."
          fi
  
      - name: Trigger Vercel Redeploy
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_<YOUR_PROJECT_ID>" \
          -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}"
