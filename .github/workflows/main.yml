name: Daily Yahoo Finance Bubble Update

on:
  schedule:
    - cron: '59 20 * * *'
  workflow_dispatch:

jobs:
  update-csvs:
    name: Scrape & Upload CSVs to Blob
    runs-on: ubuntu-latest
    permissions:
      contents: read  # read-only — nothing is committed to git anymore
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance scipy fredapi matplotlib requests

      - name: Run CSV scraper
        run: python scripts/yf_data_scraper.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BLOB_BASE_URL: ${{ secrets.BLOB_BASE_URL }}
        # The scraper now handles its own Blob download → append → Blob upload
        # internally. No git commit step needed.

  generate-mat-json:
    name: Generate JSON & Upload to Blob
    runs-on: ubuntu-latest
    needs: update-csvs
    permissions:
      contents: read  # read-only — nothing is committed to git anymore
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # fetch-depth: 0 and git pull are no longer needed —
        # CSVs are fetched from Blob, not from the repo.

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy matplotlib fredapi requests

      - name: Download CSVs from Vercel Blob
        # Pull all CSVs from Blob onto the runner so sbub_run.py and
        # bubble_estimator.py can read them exactly as before.
        run: python scripts/download_csvs_from_blob.py
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BLOB_BASE_URL: ${{ secrets.BLOB_BASE_URL }}

      - name: Run MAT generator
        run: python scripts/sbub_run.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Convert MAT into JSON files
        run: |
          mkdir -p public/data
          python scripts/bubble_estimator.py
          echo "📦 JSON files created in public/data"

      - name: Upload JSON files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bubble-json-files
          path: public/data/*.json

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Upload new JSONs to Vercel Blob & update mapping
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run scripts/update-blob-urls.ts
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # JSONs are now only in Blob — no git commit step after this.

      - name: Trigger Vercel Redeploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
        # Set VERCEL_DEPLOY_HOOK_URL as a GitHub secret.
        # Generate the hook at: Vercel Dashboard → Your Project → Settings → Git → Deploy Hooks
