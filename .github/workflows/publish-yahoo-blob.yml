name: Publish Yahoo Blob JSON

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Optional regenerate-synthetic-yahoo-json run ID to publish. Defaults to latest non-expired synthetic-yahoo-mat-json artifact."
        required: false
        type: string

jobs:
  publish-yahoo-json:
    name: Upload JSON to Blob and redeploy Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve generated JSON artifact run
        id: resolve_artifact
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          set -euo pipefail

          if [ -n "$ARTIFACT_RUN_ID" ]; then
            echo "run_id=$ARTIFACT_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "Using requested artifact run: $ARTIFACT_RUN_ID"
            exit 0
          fi

          echo "Searching recent regenerate-synthetic-yahoo-json runs for synthetic-yahoo-mat-json..."
          for run_id in $(gh api "repos/${{ github.repository }}/actions/workflows/regenerate-synthetic-yahoo-json.yml/runs?per_page=20" --jq '.workflow_runs[].id'); do
            artifact_id=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/artifacts" --jq '.artifacts[] | select(.name == "synthetic-yahoo-mat-json" and .expired == false) | .id' | head -n 1)
            if [ -n "$artifact_id" ]; then
              echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
              echo "Resolved artifact from run: $run_id"
              exit 0
            fi
          done

          echo "No non-expired synthetic-yahoo-mat-json artifact found in recent regeneration runs." >&2
          exit 1

      - name: Download generated JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: synthetic-yahoo-mat-json
          run-id: ${{ steps.resolve_artifact.outputs.run_id }}
          github-token: ${{ github.token }}
          path: .

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy matplotlib yfinance

      - name: Regenerate JSON with current price schema
        run: |
          mkdir -p public/data
          rm -f public/data/bubble_data_*_splitadj_*.json
          MPLCONFIGDIR=/tmp/matplotlib-cache python scripts/bubble_estimator.py

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate generated Yahoo JSON
        run: bun run validate-yahoo-pipeline -- --json

      - name: Upload JSON files to Vercel Blob and refresh mapping
        id: upload_blob
        run: bun run scripts/update-blob-urls.ts
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BLOB_BASE_URL: ${{ secrets.BLOB_BASE_URL }}

      - name: Validate live Yahoo Blob mapping
        run: bun run validate-yahoo-pipeline -- --blob
        env:
          BLOB_BASE_URL: ${{ secrets.BLOB_BASE_URL }}

      - name: Trigger Vercel redeploy
        if: steps.upload_blob.outputs.blob_changed == 'true'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
