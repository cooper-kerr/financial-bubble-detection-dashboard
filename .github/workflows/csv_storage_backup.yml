name: CSV storage Backup
on:
  schedule:
    - cron: '59 20 * * *'
  workflow_dispatch:

jobs:
  update-csvs:
    name: Scrape & Commit CSVs to Repo
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance scipy fredapi matplotlib requests

      - name: Run CSV scraper
        run: python scripts/yf_data_scraper.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit and push CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update CSVs [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
